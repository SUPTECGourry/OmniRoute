name: Publish Fork Image to GHCR

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/SUPTECGourry/omniroute

jobs:
  validate-build:
    name: Build Docker (validate on PR/push)
    # Always validate the Dockerfile builds, even in forks or on PRs.
    # This catches Docker-related breakage early (important for custom changes like xai-oauth + container fixes).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build only (no push, for validation)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Build and Push Fork Image
    if: github.repository == 'SUPTECGourry/OmniRoute'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=omniroute
            org.opencontainers.image.description=Unified AI proxy/router — fork image
            org.opencontainers.image.url=https://github.com/SUPTECGourry/OmniRoute
            org.opencontainers.image.source=https://github.com/SUPTECGourry/OmniRoute
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
